# Render Blueprint - Infrastructure as Code
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend Web Service
  - type: web
    name: marketplace-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: marketplace-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false # Set manually in dashboard
      - key: TURNSTILE_ENABLED
        value: false
      - key: GOOGLE_CALLBACK_URL
        sync: false # Set manually in dashboard

databases:
  # PostgreSQL Database
  - name: marketplace-db
    databaseName: marketplace
    user: marketplace_user
    region: oregon
    plan: free
    ipAllowList: []

  # Redis Cache
  - name: marketplace-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
